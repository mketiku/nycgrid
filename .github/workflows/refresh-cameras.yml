name: Refresh camera list

on:
  schedule:
    - cron: "0 9 * * 3" # Every Wednesday at 9 AM UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh:
    name: Fetch and update camera list
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch camera list
        id: fetch
        timeout-minutes: 1
        run: bun scripts/fetch-cameras.ts

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/lib/cameras/data.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected — camera list is up to date."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected: ${{ steps.fetch.outputs.old_count }} → ${{ steps.fetch.outputs.new_count }} (${{ steps.fetch.outputs.delta }})"
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD: ${{ steps.fetch.outputs.old_count }}
          NEW: ${{ steps.fetch.outputs.new_count }}
          DELTA: ${{ steps.fetch.outputs.delta }}
          SANITIZED: ${{ steps.fetch.outputs.sanitized_count }}
        run: |
          BRANCH="chore/refresh-camera-list"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add src/lib/cameras/data.ts
          git commit -m "chore(cameras): refresh DOT camera list [skip ci]"
          git push origin "$BRANCH" --force

          BODY="## Summary

          - Automated weekly refresh of the NYC DOT camera list via the DOT webcams API
          - ${OLD} → ${NEW} cameras (${DELTA})
          - ${SANITIZED} camera names sanitized (DOT equipment codes, numeric suffixes, C-code highway names)

          ## Test plan

          - [ ] Review diff in \`src/lib/cameras/data.ts\` — changes should look like additions/removals of camera entries, not wholesale rewrites
          - [ ] A large drop in count may indicate a DOT API issue even if it passed the safety floor"

          if gh pr view "$BRANCH" --json state -q .state 2>/dev/null | grep -q "OPEN"; then
            echo "PR already open for $BRANCH, skipping creation."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(cameras): refresh DOT camera list (${OLD} → ${NEW})" \
              --body "$BODY"
          fi
