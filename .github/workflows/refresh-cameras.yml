name: Refresh camera list

on:
  schedule:
    - cron: "0 9 * * 3" # Every Wednesday at 9 AM UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh:
    name: Fetch and update camera list
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Fetch camera list
        timeout-minutes: 1
        run: node scripts/fetch-cameras.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/lib/cameras/data.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected — camera list is up to date."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            OLD=$(git show HEAD:src/lib/cameras/data.ts | grep -o 'cameras — [0-9]* total' | grep -o '[0-9]*')
            NEW=$(grep -o 'cameras — [0-9]* total' src/lib/cameras/data.ts | grep -o '[0-9]*')
            DELTA=$((NEW - OLD))
            DELTA_STR=$([ $DELTA -ge 0 ] && echo "+$DELTA" || echo "$DELTA")
            echo "old_count=$OLD" >> $GITHUB_OUTPUT
            echo "new_count=$NEW" >> $GITHUB_OUTPUT
            echo "delta=$DELTA_STR" >> $GITHUB_OUTPUT
            echo "Changes detected: $OLD → $NEW ($DELTA_STR)"
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD: ${{ steps.diff.outputs.old_count }}
          NEW: ${{ steps.diff.outputs.new_count }}
          DELTA: ${{ steps.diff.outputs.delta }}
        run: |
          BRANCH="chore/refresh-camera-list"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add src/lib/cameras/data.ts
          git commit -m "chore(cameras): refresh DOT camera list [skip ci]"
          git push origin "$BRANCH" --force

          BODY="## Summary

          - Automated weekly refresh of the NYC DOT camera list via the DOT webcams API
          - ${OLD} → ${NEW} cameras (${DELTA})

          ## Test plan

          - [ ] Review diff in \`src/lib/cameras/data.ts\` — changes should look like additions/removals of camera entries, not wholesale rewrites
          - [ ] A large drop in count may indicate a DOT API issue even if it passed the safety floor"

          if gh pr view "$BRANCH" --json state -q .state 2>/dev/null | grep -q "OPEN"; then
            echo "PR already open for $BRANCH, skipping creation."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(cameras): refresh DOT camera list (${OLD} → ${NEW})" \
              --body "$BODY"
          fi
