name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for rollback (logged for audit trail)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  rollback:
    name: Rollback to Previous Deployment
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@52

      - name: Log rollback reason
        env:
          REASON: ${{ github.event.inputs.reason }}
        run: echo "Rolling back — reason:" "$REASON"

      - name: Rollback to previous deployment
        run: vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: Confirm active deployment
        run: vercel ls --token=${{ secrets.VERCEL_TOKEN }} | head -5
