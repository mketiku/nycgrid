modes = ["default", "autoEdit", "plan"]

[[rule]]
toolName = "run_command"
commandPrefix = "bunx tsx scripts/"
decision = "allow"
priority = 140
modes = ["default", "autoEdit", "plan"]

# DevOps & Deployments
[[rule]]
toolName = "run_command"
commandPrefix = "npx vercel"
decision = "allow"
priority = 160
modes = ["default", "autoEdit", "plan"]

[[rule]]
toolName = "run_command"
commandPrefix = "bunx vercel"
decision = "allow"
priority = 160
modes = ["default", "autoEdit", "plan"]

# Playwright & E2E
[[rule]]
toolName = "run_command"
