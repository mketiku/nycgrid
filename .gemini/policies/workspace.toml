decision = "allow"
priority = 400
modes = ["default", "autoEdit", "plan"]

[[rule]]
toolName = "run_command"
commandPrefix = "printenv"
decision = "allow"
priority = 300
modes = ["default", "autoEdit", "plan"]

[[rule]]
toolName = "run_command"
commandPrefix = "curl "
decision = "allow"
priority = 300
modes = ["default", "autoEdit", "plan"]

# Version Checks
